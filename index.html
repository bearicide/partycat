<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PartyCat Pinball</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#080811;color:#f7fbff;font-family:system-ui,sans-serif}main{min-height:100vh;display:grid;place-items:center;padding:16px;background:radial-gradient(circle at 20% 10%,#15364a,transparent 30%),radial-gradient(circle at 80% 20%,#451344,transparent 30%),#080811}.shell{width:min(920px,100%);display:grid;gap:12px}.top,.panel{border:1px solid rgba(255,255,255,.18);border-radius:22px;background:rgba(0,0,0,.35);padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.45)}h1{margin:0;font-size:clamp(2rem,8vw,5rem);line-height:.9;text-transform:uppercase;text-shadow:0 0 18px #22f2ff}.tag{color:#cbd3ff;margin-top:8px}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:8px;background:#101022}.stat small{display:block;color:#aeb6db;text-transform:uppercase;font-size:.7rem}.stat b{font-size:1.25rem;color:#fff15b}canvas{width:100%;aspect-ratio:720/900;background:#05050c;border:1px solid rgba(255,255,255,.18);border-radius:20px;touch-action:none}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}button,a{border:1px solid rgba(255,255,255,.18);border-radius:999px;background:linear-gradient(135deg,#194a55,#551750);color:#fff;padding:12px;font-weight:800;text-decoration:none;text-align:center;cursor:pointer}.links{display:flex;gap:8px;flex-wrap:wrap}.msg{color:#fff15b;font-weight:800}@media(max-width:700px){.hud{grid-template-columns:repeat(2,1fr)}.controls{position:sticky;bottom:8px;background:rgba(8,8,17,.75);padding:8px;border-radius:18px}}
</style>
</head>
<body>
<main><div class="shell">
<section class="top"><h1>PartyCat Pinball</h1><div class="tag">neon music pinball toy by MATTBEAR</div><div class="links"><a href="https://bearicide.github.io">MATTBEAR HOME</a><a href="https://soundcloud.com/mattbear86">SOUNDCLOUD</a></div></section>
<section class="panel"><div class="hud"><div class="stat"><small>score</small><b id="score">0</b></div><div class="stat"><small>balls</small><b id="balls">3</b></div><div class="stat"><small>combo</small><b id="combo">1.0x</b></div><div class="stat"><small>mode</small><b id="mode">ready</b></div></div><p class="msg" id="msg">Press start. Hold launch. Release.</p><canvas id="game" width="720" height="900"></canvas><div class="controls"><button id="left">LEFT</button><button id="launch">LAUNCH</button><button id="right">RIGHT</button></div><div class="links"><button id="start">START</button><button id="mute">SOUND ON</button></div></section>
</div></main>
<script>
(()=>{const c=document.getElementById('game'),x=c.getContext('2d'),W=720,H=900,$=id=>document.getElementById(id);let ball,score=0,balls=3,combo=1,run=false,muted=false,audio=null,keys={l:0,r:0,p:0},pl=0,lf=0,rf=0,shake=0,save=true,party=0,parts=[];const bump=[{x:260,y:230,r:44,t:'KICK',v:150,f:180,col:'#ff38ef'},{x:455,y:280,r:44,t:'SNARE',v:180,f:360,col:'#22f2ff'},{x:355,y:430,r:55,t:'BASS',v:260,f:90,col:'#80ff4d'}],rails=[[80,110,86,700],[635,110,625,700],[86,700,250,800],[625,700,470,800],[620,130,640,805],[112,720,212,780],[608,720,508,780]];function init(){ball={x:640,y:760,vx:0,vy:0,r:12,hold:1};pl=0;lf=0;rf=0;save=true;party=0;parts=[]}function au(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)}function beep(f,d=.14,type='square'){if(!audio||muted)return;let o=audio.createOscillator(),g=audio.createGain(),t=audio.currentTime;o.type=type;o.frequency.value=f;g.gain.value=.001;o.connect(g);g.connect(audio.destination);g.gain.exponentialRampToValueAtTime(.13,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.start(t);o.stop(t+d+.02)}function hud(){$('score').textContent=score.toLocaleString();$('balls').textContent=balls;$('combo').textContent=combo.toFixed(1)+'x';$('mode').textContent=party>0?'party':run?'live':'ready'}function add(v,t,px=360,py=200){let n=Math.round(v*combo*(party>0?1.5:1));score+=n;combo=Math.min(9.9,combo+.15);$('msg').textContent=t+' +'+n;parts.push({x:px,y:py,vx:0,vy:-1.8,life:44,text:'+'+n,col:'#fff15b'});hud()}function spark(px,py,col,n=12){for(let i=0;i<n;i++){let a=Math.random()*6.283,s=1.8+Math.random()*5;parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:22+Math.random()*22,col})}}function dist(a,b,c,d){return Math.hypot(c-a,d-b)}function cap(){let s=Math.hypot(ball.vx,ball.vy),m=28;if(s>m){ball.vx=ball.vx/s*m;ball.vy=ball.vy/s*m}}function rail(ax,ay,bx,by,bounce=.86,boost=0){let abx=bx-ax,aby=by-ay,apx=ball.x-ax,apy=ball.y-ay,len=abx*abx+aby*aby,t=Math.max(0,Math.min(1,(apx*abx+apy*aby)/len)),cx=ax+abx*t,cy=ay+aby*t,dx=ball.x-cx,dy=ball.y-cy,d=Math.hypot(dx,dy)||.001;if(d<ball.r){let nx=dx/d,ny=dy/d;ball.x=cx+nx*(ball.r+.25);ball.y=cy+ny*(ball.r+.25);let dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=(1+bounce)*dot*nx;ball.vy-=(1+bounce)*dot*ny;ball.vx+=nx*boost;ball.vy+=ny*boost;beep(240,.055);return 1}}return 0}function ends(cx,cy,len,a){let dx=Math.cos(a)*len/2,dy=Math.sin(a)*len/2;return[cx-dx,cy-dy,cx+dx,cy+dy]}function flipper(cx,cy,len,a,on,hand){let e=ends(cx,cy,len,a),hit=rail(...e,1.02,on?11:0);if(hit&&on){ball.vy-=4.5;ball.vx+=hand*3.2;shake=5;beep(hand<0?390:470,.07);spark(ball.x,ball.y,hand<0?'#22f2ff':'#ff38ef',8)}return hit}function substep(){if(ball.hold){ball.x=640;ball.y=760+pl*45;if(keys.p)pl=Math.min(1,pl+.018);else if(pl>.05){ball.hold=0;ball.vx=-4.5;ball.vy=-18-pl*24;beep(160,.22,'sawtooth');$('msg').textContent='Launch the cat.'}return}ball.vy+=.16;ball.x+=ball.vx/3;ball.y+=ball.vy/3;ball.vx*=.999;ball.vy*=.999;rails.forEach(r=>rail(...r,.88,0));if(ball.x<45){ball.x=45;ball.vx=Math.abs(ball.vx)*.9}if(ball.x>675){ball.x=675;ball.vx=-Math.abs(ball.vx)*.9}if(ball.y<45){ball.y=45;ball.vy=Math.abs(ball.vy)*.9}for(const b of bump){let d=dist(ball.x,ball.y,b.x,b.y);if(d<ball.r+b.r){let nx=(ball.x-b.x)/(d||1),ny=(ball.y-b.y)/(d||1),s=Math.max(13,Math.hypot(ball.vx,ball.vy)+3);ball.x=b.x+nx*(ball.r+b.r+.5);ball.y=b.y+ny*(ball.r+b.r+.5);ball.vx=nx*s*1.1;ball.vy=ny*s*1.1;b.hit=1;shake=8;add(b.v,b.t,b.x,b.y);spark(b.x,b.y,b.col,16);beep(b.f,.12,b.t==='BASS'?'sawtooth':'square')}}let le=ends(245,800,145,-.25-lf*.75),re=ends(475,800,145,Math.PI+.25+rf*.75);flipper(245,800,145,-.25-lf*.75,keys.l,-1);flipper(475,800,145,Math.PI+.25+rf*.75,keys.r,1);if(save&&ball.y>815&&ball.x<150){save=false;ball.x=155;ball.y=760;ball.vx=9;ball.vy=-16;add(300,'PAW SAVE',155,760);beep(620,.16);spark(155,760,'#80ff4d',18)}if(ball.y>H+30){balls--;combo=1;beep(80,.28,'sawtooth');if(balls<=0){run=false;$('msg').textContent='Game over '+score.toLocaleString()}else{ball={x:640,y:760,vx:0,vy:0,r:12,hold:1};save=true;$('msg').textContent='Ball drained. Launch again.'}}cap()}function step(){lf+=((keys.l?1:0)-lf)*.35;rf+=((keys.r?1:0)-rf)*.35;combo=Math.max(1,combo*.998);if(party>0)party--;for(let i=0;i<3;i++)substep();parts=parts.filter(p=>(p.x+=p.vx,p.y+=p.vy,p.vy+=.035,--p.life>0));shake*=.84;hud()}function glow(a,b,c,d,col,w=5){x.save();x.strokeStyle=col;x.lineWidth=w;x.shadowColor=col;x.shadowBlur=16;x.lineCap='round';x.beginPath();x.moveTo(a,b);x.lineTo(c,d);x.stroke();x.restore()}function text(t,px,py,s,col){x.save();x.font='900 '+s+'px system-ui';x.textAlign='center';x.textBaseline='middle';x.fillStyle=col;x.shadowColor=col;x.shadowBlur=12;x.fillText(t,px,py);x.restore()}function draw(){let sx=(Math.random()-.5)*shake,sy=(Math.random()-.5)*shake;x.clearRect(0,0,W,H);x.save();x.translate(sx,sy);x.fillStyle='#05050c';x.fillRect(0,0,W,H);rails.forEach((r,i)=>glow(...r,i%2?'#ff38ef':'#22f2ff',i>4?4:6));bump.forEach(b=>{b.hit=(b.hit||0)*.85;x.beginPath();x.arc(b.x,b.y,b.r+b.hit*14,0,Math.PI*2);x.fillStyle='rgba(255,255,255,.08)';x.fill();x.strokeStyle=b.col;x.lineWidth=5+b.hit*3;x.shadowColor=b.col;x.shadowBlur=20+b.hit*22;x.stroke();text(b.t,b.x,b.y,19,b.col)});let le=ends(245,800,145,-.25-lf*.75),re=ends(475,800,145,Math.PI+.25+rf*.75);glow(...le,'#22f2ff',16);glow(...re,'#ff38ef',16);x.fillStyle='rgba(255,157,40,.2)';x.fillRect(625,760,30,pl*45);if(save)text('PAW SAVE',145,735,18,'#80ff4d');x.beginPath();x.arc(ball.x,ball.y,ball.r,0,Math.PI*2);x.fillStyle='#fff';x.shadowColor='#fff15b';x.shadowBlur=20;x.fill();parts.forEach(p=>{x.save();x.globalAlpha=Math.max(0,p.life/44);if(p.text)text(p.text,p.x,p.y,22,p.col);else{x.beginPath();x.arc(p.x,p.y,3,0,Math.PI*2);x.fillStyle=p.col;x.shadowColor=p.col;x.shadowBlur=12;x.fill()}x.restore()});text('PARTYCAT',360,88,36,'#fff15b');text('MATTBEAR',360,860,18,'#f7fbff');x.restore()}function loop(){if(run)step();draw();requestAnimationFrame(loop)}function start(){au();audio&&audio.state==='suspended'&&audio.resume();score=0;balls=3;combo=1;run=true;init();$('msg').textContent='Hold launch. Release. Survive.';hud()}function hold(el,k){el.onpointerdown=e=>{e.preventDefault();au();keys[k]=1};el.onpointerup=el.onpointercancel=el.onpointerleave=e=>{e.preventDefault();keys[k]=0}}hold($('left'),'l');hold($('right'),'r');hold($('launch'),'p');$('start').onclick=start;$('mute').onclick=()=>{muted=!muted;$('mute').textContent=muted?'SOUND OFF':'SOUND ON'};addEventListener('keydown',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')keys.l=1;if(e.code==='ArrowRight'||e.code==='KeyD')keys.r=1;if(e.code==='Space'){keys.p=1;e.preventDefault()}if(e.code==='Enter'&&!run)start()});addEventListener('keyup',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')keys.l=0;if(e.code==='ArrowRight'||e.code==='KeyD')keys.r=0;if(e.code==='Space'){keys.p=0;e.preventDefault()}});init();hud();loop()})();
</script>
</body>
</html>
