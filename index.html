<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PartyCat Pinball</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#05050b;color:white;font-family:Bahnschrift,system-ui,sans-serif}canvas{display:block;width:100vw;height:100vh;background:#05050b;touch-action:none}.ui{position:fixed;top:10px;left:10px;right:10px;z-index:2;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.box{pointer-events:auto;background:#000b;border:1px solid #fff3;border-radius:16px;padding:9px 12px}.score{color:#fff25b;font-weight:900}h1{margin:0;font-size:clamp(1.8rem,5vw,3.6rem)}</style></head><body><div class='ui'><div class='box'><h1>PARTYCAT</h1><div class='score' id='score'>0</div></div><div class='box'><div id='status'>BALL READY</div></div></div><canvas id='game'></canvas><script>const cv=document.getElementById('game'),ctx=cv.getContext('2d'),S=document.getElementById('score'),M=document.getElementById('status');const W=720,H=960;let scale=1,ox=0,oy=0,left=0,right=0,launch=0,spring=0,score=0,ball;function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);scale=Math.min(innerWidth/W,innerHeight/H);ox=(innerWidth-W*scale)/2;oy=(innerHeight-H*scale)/2}addEventListener('resize',resize);resize();function serve(){ball={x:618,y:840,vx:0,vy:0,r:15,held:true,launched:false}}serve();addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=1;if(e.key==='d'||e.key==='ArrowRight')right=1;if(e.code==='Space')launch=1});addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=0;if(e.key==='d'||e.key==='ArrowRight')right=0;if(e.code==='Space')launch=0});cv.addEventListener('pointerdown',e=>{let x=(e.clientX-ox)/scale;if(x>520)launch=1;else if(x<W/2)left=1;else right=1});cv.addEventListener('pointerup',()=>{left=right=launch=0});function seg(ax,ay,bx,by,bounce=.85){let vx=bx-ax,vy=by-ay,wx=ball.x-ax,wy=ball.y-ay,l=vx*vx+vy*vy,t=Math.max(0,Math.min(1,(wx*vx+wy*vy)/l)),px=ax+vx*t,py=ay+vy*t,dx=ball.x-px,dy=ball.y-py,d=Math.hypot(dx,dy)||1;if(d<ball.r){let nx=dx/d,ny=dy/d;ball.x=px+nx*(ball.r+1);ball.y=py+ny*(ball.r+1);let dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=(1+bounce)*dot*nx;ball.vy-=(1+bounce)*dot*ny}return true}return false}function line(ax,ay,bx,by,col,w){ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=16;ctx.lineWidth=w;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke()}function physics(){if(ball.held){if(launch)spring=Math.min(1,spring+.022);else if(spring>.05){ball.held=false;ball.launched=true;ball.vx=0;ball.vy=-24-(spring*10);spring=0;M.textContent='LAUNCH'}ball.x=618;ball.y=840+spring*45;return}for(let i=0;i<4;i++){ball.vy+=.07;ball.vx*=.998;ball.x+=ball.vx/4;ball.y+=ball.vy/4;if(ball.launched&&ball.y>140){ball.launched=false}if(ball.launched){if(ball.x<595)ball.x=595;if(ball.x>645)ball.x=645}else{[[70,90,80,790],[80,790,235,875],[595,785,485,875],[95,155,205,92],[470,92,590,145],[175,710,250,790],[545,710,470,790]].forEach(a=>seg(...a,.88))}seg(595,120,595,785,.9);seg(645,90,645,900,.9);if(ball.x<32){ball.x=32;ball.vx=Math.abs(ball.vx)*.9}if(ball.x>688){ball.x=688;ball.vx=-Math.abs(ball.vx)*.9}if(ball.y<32){ball.y=32;ball.vy=Math.abs(ball.vy)*.9}let la=-.2-(left?.82:0),ra=Math.PI+.2+(right?.82:0);let lf=[250,845,250+Math.cos(la)*145,845+Math.sin(la)*145],rf=[470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145];if(seg(...lf,.98)&&left){ball.vx-=4;ball.vy-=8}if(seg(...rf,.98)&&right){ball.vx+=4;ball.vy-=8}if(ball.y>1000){serve();M.textContent='BALL READY'}}}function draw(){physics();ctx.save();ctx.clearRect(0,0,innerWidth,innerHeight);ctx.translate(ox,oy);ctx.scale(scale,scale);let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#141a46');g.addColorStop(1,'#04040a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(24,24,W-48,H-48);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=12;ctx.strokeRect(36,36,W-72,H-72);ctx.fillStyle='rgba(255,56,239,.12)';ctx.beginPath();ctx.arc(360,210,90,0,7);ctx.fill();ctx.font='900 88px sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillText('🐈',360,238);ctx.fillStyle='rgba(34,242,255,.18)';ctx.fillRect(112,148,120,32);ctx.fillStyle='rgba(255,56,239,.18)';ctx.fillRect(418,148,120,32);ctx.fillStyle='#fff';ctx.font='900 18px sans-serif';ctx.fillText('PARTY',172,170);ctx.fillText('SPIRAL',478,170);line(70,90,80,790,'#22f2ff',8);line(80,790,235,875,'#22f2ff',8);line(595,120,595,785,'#ff9d28',8);line(645,90,645,900,'#ff9d28',8);line(595,785,485,875,'#ff38ef',8);line(605,880,600,130,'#fff25b',6);line(600,130,520,90,'#fff25b',6);let la=-.2-(left?.82:0),ra=Math.PI+.2+(right?.82:0);line(250,845,250+Math.cos(la)*145,845+Math.sin(la)*145,'#22f2ff',18);line(470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145,'#ff38ef',18);ctx.fillStyle='rgba(255,157,40,.3)';ctx.fillRect(603,800,30,spring*85);ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);let rg=ctx.createRadialGradient(ball.x-5,ball.y-5,2,ball.x,ball.y,22);rg.addColorStop(0,'#fff');rg.addColorStop(.35,'#dff7ff');rg.addColorStop(1,'#222b42');ctx.fillStyle=rg;ctx.shadowColor='#fff';ctx.shadowBlur=20;ctx.fill();ctx.restore();requestAnimationFrame(draw)}draw();</script></body></html>
