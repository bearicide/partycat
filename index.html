<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PartyCat Pinball</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#05050b;color:white;font-family:Bahnschrift,system-ui,sans-serif}canvas{display:block;width:100vw;height:100vh;background:#05050b;touch-action:none}.ui{position:fixed;top:10px;left:10px;right:10px;z-index:2;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.box{pointer-events:auto;background:#000b;border:1px solid #fff3;border-radius:16px;padding:9px 12px;box-shadow:0 0 24px #000}.score{color:#fff25b;font-weight:900}h1{margin:0;font-size:clamp(1.8rem,5vw,3.6rem);text-shadow:0 0 14px #22f2ff,0 0 26px #ff38ef}.hint{font-size:.85rem;color:#cfd6ff}</style></head><body><div class='ui'><div class='box'><h1>PARTYCAT</h1><div class='score' id='score'>0</div></div><div class='box'><div id='status'>BALL READY</div><div class='hint'>A/D flippers · SPACE launcher · bumpers play notes</div></div></div><canvas id='game'></canvas><script>const cv=document.getElementById('game'),ctx=cv.getContext('2d'),S=document.getElementById('score'),M=document.getElementById('status');const W=720,H=960,C={c:'#22f2ff',p:'#ff38ef',g:'#83ff4f',y:'#fff25b',o:'#ff9d28'};let A=null,scale=1,ox=0,oy=0,left=0,right=0,launch=0,spring=0,score=0,combo=1,ball,flash=0,party=0,particles=[];function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);scale=Math.min(innerWidth/W,innerHeight/H);ox=(innerWidth-W*scale)/2;oy=(innerHeight-H*scale)/2}addEventListener('resize',resize);resize();function line(ax,ay,bx,by,col,w){ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=18;ctx.lineWidth=w;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke()}function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);ctx.save();ctx.translate(ox,oy);ctx.scale(scale,scale);ctx.fillStyle='#05050b';ctx.fillRect(0,0,W,H);line(70,90,80,790,C.c,8);line(80,790,235,875,C.c,8);line(595,120,595,785,C.o,8);line(645,90,645,900,C.o,8);line(595,785,485,875,C.p,8);line(605,880,600,130,C.y,6);line(595,230,505,122,'#ff4444',12);line(505,122,440,100,'#ff4444',12);ctx.restore();requestAnimationFrame(draw)}draw();</script></body></html>
