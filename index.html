<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PartyCat Pinball</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#05050b;color:#fff;font-family:Bahnschrift,system-ui,sans-serif}canvas{display:block;width:100vw;height:100vh;background:#05050b;touch-action:none}.ui{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none}.box{background:#000a;border:1px solid #ffffff22;border-radius:14px;padding:10px 14px;backdrop-filter:blur(6px)}h1{margin:0;color:#fff;text-shadow:0 0 12px #22f2ff,0 0 22px #ff38ef}.score{font-weight:900;color:#fff25b}</style></head><body><div class='ui'><div class='box'><h1>PARTYCAT</h1><div class='score' id='score'>0</div></div><div class='box'><div id='status'>READY</div></div></div><canvas id='c'></canvas><script>const cv=document.getElementById('c'),x=cv.getContext('2d'),S=document.getElementById('score'),M=document.getElementById('status');const W=720,H=960,C={c:'#22f2ff',p:'#ff38ef',y:'#fff25b',o:'#ff9d28'};let sc=1,ox=0,oy=0,left=0,right=0,pull=0,score=0,combo=1;const ball={x:620,y:830,vx:0,vy:0,r:14,hold:true};const bump=[{x:240,y:220,r:34,c:C.c,n:140},{x:370,y:180,r:40,c:C.p,n:220},{x:500,y:250,r:34,c:C.y,n:480},{x:290,y:380,r:38,c:'#72ff72',n:70},{x:445,y:420,r:36,c:C.o,n:320}];function rs(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);sc=Math.min(innerWidth/W,innerHeight/H);ox=(innerWidth-W*sc)/2;oy=(innerHeight-H*sc)/2}addEventListener('resize',rs);rs();let A;function aud(){if(!A)A=new(window.AudioContext||window.webkitAudioContext)();A.resume()}function tone(f,t='triangle',d=.12,g=.06){aud();const o=A.createOscillator(),v=A.createGain();o.type=t;o.frequency.value=f;v.gain.value=.001;o.connect(v);v.connect(A.destination);let tm=A.currentTime;v.gain.exponentialRampToValueAtTime(g,tm+.01);v.gain.exponentialRampToValueAtTime(.0001,tm+d);o.start(tm);o.stop(tm+d+.02)}addEventListener('keydown',e=>{aud();if(e.key==='a'||e.key==='ArrowLeft')left=1;if(e.key==='d'||e.key==='ArrowRight')right=1;if(e.code==='Space')pull=1});addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=0;if(e.key==='d'||e.key==='ArrowRight')right=0;if(e.code==='Space')pull=0});cv.addEventListener('pointerdown',e=>{aud();let px=(e.clientX-ox)/sc;if(px>530)pull=1;else if(px<W/2)left=1;else right=1});cv.addEventListener('pointerup',()=>{left=right=pull=0});function line(ax,ay,bx,by,c,w){x.strokeStyle=c;x.shadowColor=c;x.shadowBlur=18;x.lineWidth=w;x.lineCap='round';x.beginPath();x.moveTo(ax,ay);x.lineTo(bx,by);x.stroke()}function seg(ax,ay,bx,by,b=.88){let vx=bx-ax,vy=by-ay,wx=ball.x-ax,wy=ball.y-ay,l=vx*vx+vy*vy,t=Math.max(0,Math.min(1,(wx*vx+wy*vy)/l)),px=ax+vx*t,py=ay+vy*t,dx=ball.x-px,dy=ball.y-py,d=Math.hypot(dx,dy)||1;if(d<ball.r){let nx=dx/d,ny=dy/d;ball.x=px+nx*(ball.r+1);ball.y=py+ny*(ball.r+1);let dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=(1+b)*dot*nx;ball.vy-=(1+b)*dot*ny}return 1}}function hitB(){bump.forEach(b=>{let dx=ball.x-b.x,dy=ball.y-b.y,d=Math.hypot(dx,dy)||1;if(d<ball.r+b.r){let nx=dx/d,ny=dy/d,s=Math.max(10,Math.hypot(ball.vx,ball.vy)+2);ball.x=b.x+nx*(ball.r+b.r+2);ball.y=b.y+ny*(ball.r+b.r+2);ball.vx=nx*s*.8;ball.vy=ny*s*.8;tone(b.n,b.n<100?'sawtooth':'triangle');score+=Math.round(100*combo);combo=Math.min(5,combo+.05);S.textContent=score+' x'+combo.toFixed(1)}})}function phys(){if(ball.hold){if(pull)ball.y=Math.min(900,ball.y+2.4);else if(ball.y>830){ball.hold=false;ball.vx=-3.4;ball.vy=-24;tone(60,'sawtooth',.2,.12)}return}for(let i=0;i<4;i++){ball.vy+=.11;ball.vx*=.992;ball.vy*=.996;ball.x+=ball.vx/4;ball.y+=ball.vy/4;[[70,90,80,790],[80,790,235,875],[595,785,485,875],[95,155,205,92],[470,92,590,145]].forEach(a=>seg(...a,.92));seg(595,120,595,785,.9);seg(645,90,645,900,.9);seg(595,230,505,122,1.02);seg(505,122,440,100,1.01);hitB();let la=-.2-(left?.75:0),ra=Math.PI+.2+(right?.75:0);let lf=[250,845,250+Math.cos(la)*145,845+Math.sin(la)*145],rf=[470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145];if(seg(...lf,1)&&left){ball.vx-=3.2;ball.vy-=7;tone(160,'square',.05,.03)}if(seg(...rf,1)&&right){ball.vx+=3.2;ball.vy-=7;tone(190,'square',.05,.03)}if(ball.x<32){ball.x=32;ball.vx=Math.abs(ball.vx)*.8}if(ball.x>688){ball.x=688;ball.vx=-Math.abs(ball.vx)*.8}if(ball.y<32){ball.y=32;ball.vy=Math.abs(ball.vy)*.8}if(ball.y>1020){ball.x=620;ball.y=830;ball.vx=0;ball.vy=0;ball.hold=true;combo=1;M.textContent='DRAIN'}}combo=Math.max(1,combo*.999)}function draw(){phys();x.clearRect(0,0,innerWidth,innerHeight);x.save();x.translate(ox,oy);x.scale(sc,sc);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#151b46');g.addColorStop(1,'#05050b');x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle='rgba(0,0,0,.32)';x.fillRect(26,26,W-52,H-52);line(70,90,80,790,C.c,8);line(80,790,235,875,C.c,8);line(595,120,595,785,C.o,8);line(645,90,645,900,C.o,8);line(595,785,485,875,C.p,8);line(605,880,600,130,C.y,5);line(595,230,505,122,'#ff4444',10);line(505,122,440,100,'#ff4444',10);bump.forEach(b=>{x.beginPath();x.arc(b.x,b.y,b.r+10,0,7);x.fillStyle=b.c+'22';x.fill();x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fillStyle=b.c;x.shadowColor=b.c;x.shadowBlur=25;x.fill()});let la=-.2-(left?.75:0),ra=Math.PI+.2+(right?.75:0);line(250,845,250+Math.cos(la)*145,845+Math.sin(la)*145,C.c,18);line(470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145,C.p,18);x.beginPath();x.arc(ball.x,ball.y,ball.r,0,7);let rg=x.createRadialGradient(ball.x-4,ball.y-4,2,ball.x,ball.y,20);rg.addColorStop(0,'#fff');rg.addColorStop(.4,'#dff7ff');rg.addColorStop(1,'#1d2436');x.fillStyle=rg;x.shadowColor='#fff';x.shadowBlur=18;x.fill();x.restore();requestAnimationFrame(draw)}draw();</script></body></html>
