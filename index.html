<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PartyCat Pinball</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#05050b;color:white;font-family:Bahnschrift,system-ui,sans-serif}canvas{display:block;width:100vw;height:100vh;background:#05050b;touch-action:none}.ui{position:fixed;top:10px;left:10px;right:10px;z-index:2;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.box{pointer-events:auto;background:#000b;border:1px solid #fff3;border-radius:16px;padding:9px 12px;box-shadow:0 0 24px #000}.score{color:#fff25b;font-weight:900}h1{margin:0;font-size:clamp(1.8rem,5vw,3.6rem);text-shadow:0 0 14px #22f2ff,0 0 26px #ff38ef}.hint{font-size:.85rem;color:#cfd6ff}</style></head><body><div class='ui'><div class='box'><h1>PARTYCAT</h1><div class='score' id='score'>0</div></div><div class='box'><div id='status'>BALL READY</div><div class='hint'>A/D flippers · SPACE launcher · bumpers play notes</div></div></div><canvas id='game'></canvas><script>const cv=document.getElementById('game'),ctx=cv.getContext('2d'),S=document.getElementById('score'),M=document.getElementById('status');const W=720,H=960,C={c:'#22f2ff',p:'#ff38ef',g:'#83ff4f',y:'#fff25b',o:'#ff9d28'};let A=null,scale=1,ox=0,oy=0,left=0,right=0,launch=0,spring=0,score=0,combo=1,ball,flash=0,party=0,particles=[];const bumpers=[{id:'KICK',x:210,y:235,r:36,f:65,c:C.c,val:100,type:'kick'},{id:'SNARE',x:355,y:185,r:40,f:230,c:C.p,val:120,type:'snare'},{id:'HAT',x:505,y:245,r:34,f:880,c:C.y,val:90,type:'hat'},{id:'BASS',x:285,y:380,r:38,f:55,c:C.g,val:180,type:'bass'},{id:'STAB',x:455,y:390,r:38,f:330,c:C.o,val:160,type:'stab'},{id:'WILD',x:360,y:520,r:42,f:660,c:'#b45cff',val:250,type:'wild'},{id:'ARP',x:555,y:520,r:30,f:990,c:'#ff6bd6',val:140,type:'arp'},{id:'SUB',x:170,y:475,r:32,f:45,c:'#48ffcc',val:170,type:'bass'}];const targets=[{id:'PARTY',x:160,y:600,w:88,h:22,c:C.p,val:150},{id:'CAT',x:316,y:630,w:88,h:22,c:C.c,val:180},{id:'DROP',x:472,y:600,w:88,h:22,c:C.y,val:150},{id:'LOOP',x:565,y:660,w:76,h:22,c:C.g,val:160}];function audio(){if(!A)A=new(window.AudioContext||window.webkitAudioContext)();A.resume()}function tone(f,type='triangle',dur=.16,gain=.08){audio();const o=A.createOscillator(),v=A.createGain();o.type=type;o.frequency.value=f;v.gain.value=.001;o.connect(v);v.connect(A.destination);let t=A.currentTime;v.gain.exponentialRampToValueAtTime(gain,t+.01);v.gain.exponentialRampToValueAtTime(.0001,t+dur);o.start(t);o.stop(t+dur+.02)}function noise(d=.08,gain=.05){audio();let n=A.createBufferSource(),b=A.createBuffer(1,A.sampleRate*d,A.sampleRate),data=b.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;n.buffer=b;let v=A.createGain();v.gain.value=gain;n.connect(v);v.connect(A.destination);n.start();v.gain.exponentialRampToValueAtTime(.0001,A.currentTime+d)}function play(kind,f){if(kind==='kick'){tone(f,'sine',.18,.13);tone(f*.5,'sine',.22,.08)}else if(kind==='snare'){noise(.11,.07);tone(f,'triangle',.08,.05)}else if(kind==='hat'){noise(.035,.035);tone(f,'square',.045,.025)}else if(kind==='bass'){tone(f,'sawtooth',.24,.12)}else if(kind==='stab'){tone(f,'square',.12,.08);tone(f*1.5,'triangle',.12,.04)}else if(kind==='wild'){[f,f*1.25,f*1.5].forEach((q,i)=>setTimeout(()=>tone(q,'triangle',.1,.06),i*35))}else{tone(f,'triangle',.1,.06)}}function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);scale=Math.min(innerWidth/W,innerHeight/H);ox=(innerWidth-W*scale)/2;oy=(innerHeight-H*scale)/2}addEventListener('resize',resize);resize();function serve(){ball={x:618,y:840,vx:0,vy:0,r:15,held:true,launched:false,cool:{}};spring=0;M.textContent='BALL READY'}serve();addEventListener('keydown',e=>{audio();if(e.key==='a'||e.key==='ArrowLeft')left=1;if(e.key==='d'||e.key==='ArrowRight')right=1;if(e.code==='Space'){launch=1;e.preventDefault()}});addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=0;if(e.key==='d'||e.key==='ArrowRight')right=0;if(e.code==='Space'){launch=0;e.preventDefault()}});cv.addEventListener('pointerdown',e=>{audio();let x=(e.clientX-ox)/scale;if(x>520)launch=1;else if(x<W/2)left=1;else right=1});cv.addEventListener('pointerup',()=>{left=right=launch=0});function add(n,t){let pts=Math.round(n*combo);score+=pts;combo=Math.min(8,combo+.1);S.textContent=score.toLocaleString()+'  x'+combo.toFixed(1);M.textContent=t;flash=7;if(combo>3)party=160;if(Math.floor(combo*10)%10===0)play('arp',440+combo*80)}function spark(x,y,c,n=10){for(let i=0;i<n;i++){let a=Math.random()*6.28,s=1+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:25,c})}}function seg(ax,ay,bx,by,b=.9,kickx=0,kicky=0){let vx=bx-ax,vy=by-ay,wx=ball.x-ax,wy=ball.y-ay,l=vx*vx+vy*vy,t=Math.max(0,Math.min(1,(wx*vx+wy*vy)/l)),px=ax+vx*t,py=ay+vy*t,dx=ball.x-px,dy=ball.y-py,d=Math.hypot(dx,dy)||1;if(d<ball.r){let nx=dx/d,ny=dy/d;ball.x=px+nx*(ball.r+1.5);ball.y=py+ny*(ball.r+1.5);let dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=(1+b)*dot*nx;ball.vy-=(1+b)*dot*ny}ball.vx+=kickx;ball.vy+=kicky;return 1}return 0}function bumper(p){let dx=ball.x-p.x,dy=ball.y-p.y,d=Math.hypot(dx,dy)||1,hit=d<ball.r+p.r;if(hit&&!ball.cool[p.id]){ball.cool[p.id]=18;let nx=dx/d,ny=dy/d,sp=Math.max(14,Math.hypot(ball.vx,ball.vy)+5);ball.x=p.x+nx*(ball.r+p.r+2);ball.y=p.y+ny*(ball.r+p.r+2);ball.vx=nx*sp;ball.vy=ny*sp;play(p.type,p.f);add(p.val,p.id);spark(p.x,p.y,p.c,18);p.hit=12}}function target(t){let hit=ball.x>t.x-t.w/2&&ball.x<t.x+t.w/2&&Math.abs(ball.y-t.y)<ball.r+t.h/2;if(hit&&!ball.cool[t.id]){ball.cool[t.id]=25;ball.vy*=-.9;ball.vx+=(ball.x<t.x?-2:2);play('stab',720);add(t.val,t.id);spark(t.x,t.y,t.c,14);t.hit=14}}function physics(){if(ball.held){if(launch)spring=Math.min(1,spring+.024);else if(spring>.05){ball.held=false;ball.launched=true;ball.vx=-4.5;ball.vy=-30-(spring*10);spring=0;M.textContent='LAUNCH';play('bass',70)}ball.x=618;ball.y=840+spring*45;return}for(let i=0;i<5;i++){ball.vy+=.065;ball.vx*=.998;ball.x+=ball.vx/5;ball.y+=ball.vy/5;if(ball.launched&&ball.y<255){ball.vx-=.21}if(ball.launched&&ball.y>255)ball.launched=false;[[70,90,80,790],[80,790,235,875],[595,785,485,875],[95,155,205,92],[470,92,590,145],[175,710,250,790],[545,710,470,790],[540,735,610,805]].forEach(a=>seg(...a,.92));seg(595,120,595,785,.9);seg(645,90,645,900,.9);seg(595,230,505,122,1.12,-1.6,-.4);seg(505,122,440,100,1.05,-1.4,.35);bumpers.forEach(bumper);targets.forEach(target);if(ball.x<32){ball.x=32;ball.vx=Math.abs(ball.vx)*.9}if(ball.x>688){ball.x=688;ball.vx=-Math.abs(ball.vx)*.9}if(ball.y<32){ball.y=32;ball.vy=Math.abs(ball.vy)*.9}let la=-.2-(left?.82:0),ra=Math.PI+.2+(right?.82:0);let lf=[250,845,250+Math.cos(la)*145,845+Math.sin(la)*145],rf=[470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145];if(seg(...lf,1.02)&&left){ball.vx-=4.3;ball.vy-=8.2;play('hat',180);add(15,'FLIP')}if(seg(...rf,1.02)&&right){ball.vx+=4.3;ball.vy-=8.2;play('hat',200);add(15,'FLIP')}if(ball.y>1000){combo=1;serve()}}Object.keys(ball.cool).forEach(k=>{if(--ball.cool[k]<=0)delete ball.cool[k]});bumpers.forEach(p=>{p.hit=Math.max(0,(p.hit||0)-1)});targets.forEach(t=>{t.hit=Math.max(0,(t.hit||0)-1)});combo=Math.max(1,combo*.9992);particles=particles.filter(p=>(p.x+=p.vx,p.y+=p.vy,p.vy+=.06,--p.life>0))}function line(ax,ay,bx,by,col,w){ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=18;ctx.lineWidth=w;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke()}function text(t,x,y,s,col){ctx.font='900 '+s+'px Bahnschrift,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=10;ctx.fillText(t,x,y)}function draw(){physics();ctx.save();ctx.clearRect(0,0,innerWidth,innerHeight);ctx.translate(ox,oy);ctx.scale(scale,scale);let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,party?'#34125a':'#141a46');g.addColorStop(1,'#04040a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(24,24,W-48,H-48);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=12;ctx.strokeRect(36,36,W-72,H-76);text('🐈',360,86,54,'rgba(255,255,255,.18)');line(70,90,80,790,C.c,8);line(80,790,235,875,C.c,8);line(595,120,595,785,C.o,8);line(645,90,645,900,C.o,8);line(595,785,485,875,C.p,8);line(605,880,600,130,C.y,6);line(595,230,505,122,'#ff4444',12);line(505,122,440,100,'#ff4444',12);line(540,735,610,805,C.g,7);targets.forEach(t=>{ctx.save();ctx.translate(t.x,t.y);ctx.fillStyle=t.c+(t.hit?'aa':'44');ctx.shadowColor=t.c;ctx.shadowBlur=18+(t.hit||0);ctx.fillRect(-t.w/2,-t.h/2,t.w,t.h);text(t.id,0,1,13,'#fff');ctx.restore()});bumpers.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,b.r+12+(b.hit||0),0,7);ctx.fillStyle=b.c+'22';ctx.fill();ctx.beginPath();ctx.arc(b.x,b.y,b.r+(b.hit||0)*.45,0,7);ctx.fillStyle=b.c;ctx.shadowColor=b.c;ctx.shadowBlur=28;ctx.fill();ctx.beginPath();ctx.arc(b.x,b.y,b.r*.45,0,7);ctx.fillStyle='#fff';ctx.fill();text(b.id,b.x,b.y+b.r+20,13,b.c)});let la=-.2-(left?.82:0),ra=Math.PI+.2+(right?.82:0);line(250,845,250+Math.cos(la)*145,845+Math.sin(la)*145,C.c,18);line(470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145,C.p,18);ctx.fillStyle='rgba(255,157,40,.3)';ctx.fillRect(603,800,30,spring*85);particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/25);ctx.beginPath();ctx.arc(p.x,p.y,3,0,7);ctx.fillStyle=p.c;ctx.fill()});ctx.globalAlpha=1;let rg=ctx.createRadialGradient(ball.x-5,ball.y-5,2,ball.x,ball.y,22);rg.addColorStop(0,'#fff');rg.addColorStop(.35,'#dff7ff');rg.addColorStop(1,'#222b42');ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fillStyle=rg;ctx.shadowColor='#fff';ctx.shadowBlur=20;ctx.fill();if(flash>0){ctx.fillStyle='rgba(255,242,91,.08)';ctx.fillRect(0,0,W,H);flash--}if(party>0){party--;text('PARTY MODE',360,150,36,C.y)}ctx.restore();requestAnimationFrame(draw)}draw();</script></body></html>
