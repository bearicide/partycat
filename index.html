<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PartyCat Pinball</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#05050b;color:white;font-family:Bahnschrift,system-ui,sans-serif}canvas{display:block;width:100vw;height:100vh;background:#05050b;touch-action:none}.ui{position:fixed;top:10px;left:10px;right:10px;z-index:2;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.box{pointer-events:auto;background:#000b;border:1px solid #fff3;border-radius:16px;padding:9px 12px;box-shadow:0 0 24px #000}h1{margin:0;font-size:clamp(1.8rem,5vw,3.6rem);line-height:.9;text-shadow:0 0 14px #22f2ff,0 0 28px #ff38ef}.score{color:#fff25b;font-weight:900;text-shadow:0 0 12px #fff25b}.help{font-size:.9rem;color:#d8ddff}.btn{display:inline-block;margin-top:5px;color:#fff;text-decoration:none;border:1px solid #fff4;border-radius:999px;padding:7px 10px;background:linear-gradient(135deg,#124750,#551750);font-weight:900}</style></head><body><div class='ui'><div class='box'><h1>PARTYCAT</h1><div class='help'>A/D or touch sides · hold SPACE / touch shooter</div><div class='score' id='score'>0</div></div><div class='box'><div id='status'>BALL READY</div><a class='btn' href='https://github.com/bearicide/partycat'>repo</a></div></div><canvas id='game'></canvas><script>const cv=document.getElementById('game'),ctx=cv.getContext('2d'),S=document.getElementById('score'),M=document.getElementById('status');const W=720,H=960,C={c:'#22f2ff',p:'#ff38ef',g:'#83ff4f',y:'#fff25b',o:'#ff9d28'};let sc=1,ox=0,oy=0,left=0,right=0,launch=0,spring=0,score=0,flash=0,party=0,trail=[],bits=[],ball;function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);sc=Math.min(innerWidth/W,innerHeight/H);ox=(innerWidth-W*sc)/2;oy=(innerHeight-H*sc)/2}addEventListener('resize',resize);resize();function screen(e){return{x:(e.clientX-ox)/sc,y:(e.clientY-oy)/sc}}function serve(){ball={x:650,y:820,vx:0,vy:0,r:15,held:true,cool:{}};trail=[];spring=0;M.textContent='BALL READY'}serve();function add(n,t,x,y){score+=n;S.textContent=score.toLocaleString();M.textContent=t;flash=8;bits.push({x,y,t:'+'+n,life:34});if(score%1800<n)party=240}addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=1;if(e.key==='d'||e.key==='ArrowRight')right=1;if(e.code==='Space'){launch=1;e.preventDefault()}});addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=0;if(e.key==='d'||e.key==='ArrowRight')right=0;if(e.code==='Space'){launch=0;e.preventDefault()}});cv.addEventListener('pointerdown',e=>{let p=screen(e);if(p.x>570)launch=1;else if(p.x<W/2)left=1;else right=1});cv.addEventListener('pointerup',()=>{left=right=launch=0});cv.addEventListener('pointercancel',()=>{left=right=launch=0});function collideSeg(ax,ay,bx,by,pow=.82){let vx=bx-ax,vy=by-ay,wx=ball.x-ax,wy=ball.y-ay,l=vx*vx+vy*vy,t=Math.max(0,Math.min(1,(wx*vx+wy*vy)/l)),px=ax+vx*t,py=ay+vy*t,dx=ball.x-px,dy=ball.y-py,d=Math.hypot(dx,dy)||1;if(d<ball.r){let nx=dx/d,ny=dy/d;ball.x=px+nx*(ball.r+1);ball.y=py+ny*(ball.r+1);let dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=(1+pow)*dot*nx;ball.vy-=(1+pow)*dot*ny}return true}return false}function bumper(x,y,r,col,name,val,force){let d=Math.hypot(ball.x-x,ball.y-y),hit=d<ball.r+r;if(hit&&!ball.cool[name]){ball.cool[name]=12;let nx=(ball.x-x)/(d||1),ny=(ball.y-y)/(d||1),sp=Math.max(force,Math.hypot(ball.vx,ball.vy)+3);ball.x=x+nx*(r+ball.r+1);ball.y=y+ny*(r+ball.r+1);ball.vx=nx*sp;ball.vy=ny*sp;add(val,name,x,y)}drawBumper(x,y,r+(hit?8:0),col,name)}function step(){if(ball.held){if(launch)spring=Math.min(1,spring+.022);else if(spring>.03){ball.held=false;ball.vx=-4-spring*4;ball.vy=-18-spring*13;M.textContent='LAUNCH';spring=0}ball.x=650;ball.y=820+spring*45;return}for(let sub=0;sub<3;sub++){ball.vy+=.065;ball.vx*=.999;ball.x+=ball.vx/3;ball.y+=ball.vy/3;[[70,90,80,790],[80,790,235,875],[640,120,640,785],[690,90,690,900],[640,785,485,875],[650,880,645,130],[645,130,560,90],[95,155,205,92],[520,92,635,145],[175,710,250,790],[545,710,470,790]].forEach(a=>collideSeg(...a,.86));if(ball.x<35){ball.x=35;ball.vx=Math.abs(ball.vx)*.9}if(ball.x>705){ball.x=705;ball.vx=-Math.abs(ball.vx)*.9}if(ball.y<32){ball.y=32;ball.vy=Math.abs(ball.vy)*.9}let la=-.18-(left?.82:0),ra=Math.PI+.18+(right?.82:0);let l2=[250,845,250+Math.cos(la)*145,845+Math.sin(la)*145],r2=[470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145];if(collideSeg(...l2,.95)&&left){ball.vx-=4;ball.vy-=7;add(20,'FLIP',250,845)}if(collideSeg(...r2,.95)&&right){ball.vx+=4;ball.vy-=7;add(20,'FLIP',470,845)}if(!left&&Math.abs(ball.x-295)<60&&Math.abs(ball.y-835)<22&&ball.vy>0&&Math.abs(ball.vx)<3){ball.vx*=.88;ball.vy*=.55;M.textContent='CAUGHT'}if(!right&&Math.abs(ball.x-425)<60&&Math.abs(ball.y-835)<22&&ball.vy>0&&Math.abs(ball.vx)<3){ball.vx*=.88;ball.vy*=.55;M.textContent='CAUGHT'}let sp=Math.hypot(ball.vx,ball.vy);if(sp>27){ball.vx=ball.vx/sp*27;ball.vy=ball.vy/sp*27}}Object.keys(ball.cool).forEach(k=>{if(--ball.cool[k]<=0)delete ball.cool[k]});if(ball.y>990){serve();M.textContent='DRAIN - BALL SERVED'}}function glowLine(ax,ay,bx,by,col,w=6){ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=16;ctx.lineWidth=w;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke()}function text(t,x,y,s,col){ctx.font='900 '+s+'px Bahnschrift,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=10;ctx.fillText(t,x,y)}function drawBumper(x,y,r,col,name){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=24;ctx.fill();text(name,x,y,16,'#fff')}function draw(){if(ball)step();ctx.save();ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);ctx.clearRect(0,0,innerWidth,innerHeight);ctx.translate(ox,oy);ctx.scale(sc,sc);let bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,party?'#35185a':'#101948');bg.addColorStop(1,'#030309');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(0,0,0,.34)';ctx.fillRect(28,32,W-56,H-64);ctx.strokeStyle='rgba(255,255,255,.11)';ctx.lineWidth=12;ctx.strokeRect(35,38,W-70,H-76);for(let y=90;y<900;y+=32){ctx.strokeStyle='rgba(255,255,255,.045)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(680,y+14);ctx.stroke()}text('🐈',360,210,78,'rgba(255,56,239,.22)');text('SPIRAL UP',360,122,34,C.o);[[70,90,80,790,C.c,8],[80,790,235,875,C.c,8],[640,120,640,785,C.o,8],[690,90,690,900,C.o,8],[640,785,485,875,C.p,8],[650,880,645,130,C.y,7],[645,130,560,90,C.y,7],[95,155,205,92,C.g,4],[520,92,635,145,C.g,4],[175,710,250,790,C.c,10],[545,710,470,790,C.p,10]].forEach(a=>glowLine(...a));ctx.fillStyle='rgba(255,157,40,.28)';ctx.fillRect(633,800,28,spring*82);bumper(250,285,42,C.p,'KICK',100,12);bumper(475,335,48,C.c,'BASS',160,14);bumper(360,505,38,C.g,'WILD',220,16);let la=-.18-(left?.82:0),ra=Math.PI+.18+(right?.82:0);glowLine(250,845,250+Math.cos(la)*145,845+Math.sin(la)*145,C.c,18);glowLine(470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145,C.p,18);trail.push({x:ball.x,y:ball.y});if(trail.length>18)trail.shift();trail.forEach((q,i)=>{ctx.globalAlpha=i/trail.length*.2;ctx.beginPath();ctx.arc(q.x,q.y,ball.r,0,7);ctx.fillStyle=party?C.y:C.c;ctx.fill()});ctx.globalAlpha=1;let rg=ctx.createRadialGradient(ball.x-6,ball.y-6,2,ball.x,ball.y,23);rg.addColorStop(0,'#fff');rg.addColorStop(.36,'#e4fbff');rg.addColorStop(1,'#1c2236');ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fillStyle=rg;ctx.shadowColor='#fff';ctx.shadowBlur=22;ctx.fill();bits=bits.filter(b=>--b.life>0);bits.forEach(b=>{b.y-=1.4;text(b.t,b.x,b.y,22,C.y)});if(flash>0){ctx.fillStyle='rgba(255,242,91,.08)';ctx.fillRect(0,0,W,H);flash--}if(party>0){party--;text('PARTY MODE',360,170,40,C.y)}ctx.restore();requestAnimationFrame(draw)}draw();</script></body></html>
