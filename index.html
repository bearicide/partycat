<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PartyCat Pinball</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#05050b;color:white;font-family:Bahnschrift,system-ui,sans-serif}canvas{display:block;width:100vw;height:100vh;background:#05050b;touch-action:none}.ui{position:fixed;top:10px;left:10px;right:10px;z-index:2;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.box{pointer-events:auto;background:#000b;border:1px solid #fff3;border-radius:16px;padding:9px 12px}.score{color:#fff25b;font-weight:900}h1{margin:0;font-size:clamp(1.8rem,5vw,3.6rem)}</style></head><body><div class='ui'><div class='box'><h1>PARTYCAT</h1><div class='score' id='score'>0</div></div><div class='box'><div id='status'>BALL READY</div></div></div><canvas id='game'></canvas><script>const cv=document.getElementById('game'),ctx=cv.getContext('2d'),A=new(window.AudioContext||window.webkitAudioContext)(),W=720,H=960;let scale=1,ox=0,oy=0,left=0,right=0,launch=0,spring=0,score=0,ball;const bumpers=[{x:220,y:230,r:34,f:220,c:'#22f2ff'},{x:360,y:180,r:38,f:330,c:'#ff38ef'},{x:500,y:250,r:34,f:440,c:'#fff25b'},{x:300,y:360,r:30,f:550,c:'#6dff7a'},{x:450,y:410,r:30,f:660,c:'#ff9d28'}];function tone(f){const o=A.createOscillator(),g=A.createGain();o.type='triangle';o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(A.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,A.currentTime+.18);o.stop(A.currentTime+.2)}function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);scale=Math.min(innerWidth/W,innerHeight/H);ox=(innerWidth-W*scale)/2;oy=(innerHeight-H*scale)/2}addEventListener('resize',resize);resize();function serve(){ball={x:618,y:840,vx:0,vy:0,r:15,held:true,launched:false}}serve();addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=1;if(e.key==='d'||e.key==='ArrowRight')right=1;if(e.code==='Space')launch=1});addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=0;if(e.key==='d'||e.key==='ArrowRight')right=0;if(e.code==='Space')launch=0});cv.addEventListener('pointerdown',e=>{A.resume();let x=(e.clientX-ox)/scale;if(x>520)launch=1;else if(x<W/2)left=1;else right=1});cv.addEventListener('pointerup',()=>{left=right=launch=0});function seg(ax,ay,bx,by,b=.9){let vx=bx-ax,vy=by-ay,wx=ball.x-ax,wy=ball.y-ay,l=vx*vx+vy*vy,t=Math.max(0,Math.min(1,(wx*vx+wy*vy)/l)),px=ax+vx*t,py=ay+vy*t,dx=ball.x-px,dy=ball.y-py,d=Math.hypot(dx,dy)||1;if(d<ball.r){let nx=dx/d,ny=dy/d;ball.x=px+nx*(ball.r+1);ball.y=py+ny*(ball.r+1);let dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=(1+b)*dot*nx;ball.vy-=(1+b)*dot*ny}return 1}}function bumper(p){let dx=ball.x-p.x,dy=ball.y-p.y,d=Math.hypot(dx,dy)||1;if(d<ball.r+p.r){let nx=dx/d,ny=dy/d;ball.x=p.x+nx*(ball.r+p.r+2);ball.y=p.y+ny*(ball.r+p.r+2);ball.vx+=nx*7;ball.vy+=ny*7;tone(p.f);score+=100}}function physics(){if(ball.held){if(launch)spring=Math.min(1,spring+.022);else if(spring>.05){ball.held=false;ball.launched=true;ball.vx=-4;ball.vy=-31-(spring*10);spring=0}ball.x=618;ball.y=840+spring*45;return}for(let i=0;i<4;i++){ball.vy+=.08;ball.vx*=.998;ball.x+=ball.vx/4;ball.y+=ball.vy/4;if(ball.launched&&ball.y<230){ball.vx-=.18}if(ball.launched&&ball.y>230)ball.launched=false;[[70,90,80,790],[80,790,235,875],[595,785,485,875],[95,155,205,92],[470,92,590,145],[595,220,520,120],[520,120,440,100],[175,710,250,790],[545,710,470,790]].forEach(a=>seg(...a,.92));seg(595,120,595,785,.9);seg(645,90,645,900,.9);seg(595,220,500,120,1.2);bumpers.forEach(bumper);if(ball.x<32){ball.x=32;ball.vx=Math.abs(ball.vx)*.9}if(ball.x>688){ball.x=688;ball.vx=-Math.abs(ball.vx)*.9}if(ball.y<32){ball.y=32;ball.vy=Math.abs(ball.vy)*.9}let la=-.2-(left?.82:0),ra=Math.PI+.2+(right?.82:0);let lf=[250,845,250+Math.cos(la)*145,845+Math.sin(la)*145],rf=[470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145];if(seg(...lf,1)&&left){ball.vx-=4;ball.vy-=8}if(seg(...rf,1)&&right){ball.vx+=4;ball.vy-=8}if(ball.y>1000)serve()}}function line(ax,ay,bx,by,col,w){ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=18;ctx.lineWidth=w;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke()}function draw(){physics();ctx.save();ctx.clearRect(0,0,innerWidth,innerHeight);ctx.translate(ox,oy);ctx.scale(scale,scale);let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#141a46');g.addColorStop(1,'#04040a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(24,24,W-48,H-48);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=12;ctx.strokeRect(36,36,W-72,H-76);line(70,90,80,790,'#22f2ff',8);line(80,790,235,875,'#22f2ff',8);line(595,120,595,785,'#ff9d28',8);line(645,90,645,900,'#ff9d28',8);line(595,785,485,875,'#ff38ef',8);line(605,880,600,130,'#fff25b',6);line(595,220,500,120,'#ff4444',10);bumpers.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,b.r+10,0,7);ctx.fillStyle=b.c+'22';ctx.fill();ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fillStyle=b.c;ctx.shadowColor=b.c;ctx.shadowBlur=25;ctx.fill();ctx.beginPath();ctx.arc(b.x,b.y,b.r*.45,0,7);ctx.fillStyle='#fff';ctx.fill()});let la=-.2-(left?.82:0),ra=Math.PI+.2+(right?.82:0);line(250,845,250+Math.cos(la)*145,845+Math.sin(la)*145,'#22f2ff',18);line(470,845,470+Math.cos(ra)*145,845+Math.sin(ra)*145,'#ff38ef',18);ctx.fillStyle='rgba(255,157,40,.3)';ctx.fillRect(603,800,30,spring*85);ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);let rg=ctx.createRadialGradient(ball.x-5,ball.y-5,2,ball.x,ball.y,22);rg.addColorStop(0,'#fff');rg.addColorStop(.35,'#dff7ff');rg.addColorStop(1,'#222b42');ctx.fillStyle=rg;ctx.shadowColor='#fff';ctx.shadowBlur=20;ctx.fill();ctx.restore();requestAnimationFrame(draw)}draw();</script></body></html>
