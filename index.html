<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PartyCat Pinball</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#080811;color:#f7fbff;font-family:system-ui,sans-serif}main{min-height:100vh;display:grid;place-items:center;padding:16px;background:radial-gradient(circle at 20% 10%,#15364a,transparent 30%),radial-gradient(circle at 80% 20%,#451344,transparent 30%),#080811}.shell{width:min(920px,100%);display:grid;gap:12px}.top,.panel{border:1px solid rgba(255,255,255,.18);border-radius:22px;background:rgba(0,0,0,.35);padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.45)}h1{margin:0;font-size:clamp(2rem,8vw,5rem);line-height:.9;text-transform:uppercase;text-shadow:0 0 18px #22f2ff}.tag{color:#cbd3ff;margin-top:8px}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:8px;background:#101022}.stat small{display:block;color:#aeb6db;text-transform:uppercase;font-size:.7rem}.stat b{font-size:1.25rem;color:#fff15b}canvas{width:100%;aspect-ratio:720/900;background:#05050c;border:1px solid rgba(255,255,255,.18);border-radius:20px;touch-action:none}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}button,a{border:1px solid rgba(255,255,255,.18);border-radius:999px;background:linear-gradient(135deg,#194a55,#551750);color:#fff;padding:12px;font-weight:800;text-decoration:none;text-align:center;cursor:pointer}.links{display:flex;gap:8px;flex-wrap:wrap}.msg{color:#fff15b;font-weight:800}@media(max-width:700px){.hud{grid-template-columns:repeat(2,1fr)}.controls{position:sticky;bottom:8px;background:rgba(8,8,17,.75);padding:8px;border-radius:18px}}
</style>
</head>
<body>
<main><div class="shell">
<section class="top"><h1>PartyCat Pinball</h1><div class="tag">neon music pinball toy by MATTBEAR</div><div class="links"><a href="https://bearicide.github.io">MATTBEAR HOME</a><a href="https://soundcloud.com/mattbear86">SOUNDCLOUD</a></div></section>
<section class="panel"><div class="hud"><div class="stat"><small>score</small><b id="score">0</b></div><div class="stat"><small>balls</small><b id="balls">3</b></div><div class="stat"><small>combo</small><b id="combo">1.0x</b></div><div class="stat"><small>mode</small><b id="mode">ready</b></div></div><p class="msg" id="msg">Press start. Hold launch. Release.</p><canvas id="game" width="720" height="900"></canvas><div class="controls"><button id="left">LEFT</button><button id="launch">LAUNCH</button><button id="right">RIGHT</button></div><div class="links"><button id="start">START</button><button id="mute">SOUND ON</button></div></section>
</div></main>
<script>
const c=document.getElementById('game'),x=c.getContext('2d'),W=720,H=900;let ball,score=0,balls=3,combo=1,run=false,muted=false,audio=null,keys={l:0,r:0,p:0},pl=0,lf=0,rf=0;const $=id=>document.getElementById(id);const bump=[{x:260,y:230,r:44,t:'KICK',v:150,f:180,col:'#ff38ef'},{x:455,y:280,r:44,t:'SNARE',v:180,f:360,col:'#22f2ff'},{x:355,y:430,r:55,t:'BASS',v:260,f:90,col:'#80ff4d'}];function init(){ball={x:640,y:760,vx:0,vy:0,r:12,hold:1};pl=0}function au(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)}function beep(f){if(!audio||muted)return;let o=audio.createOscillator(),g=audio.createGain(),t=audio.currentTime;o.type='square';o.frequency.value=f;g.gain.value=.001;o.connect(g);g.connect(audio.destination);g.gain.exponentialRampToValueAtTime(.12,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+.16);o.start(t);o.stop(t+.18)}function hud(){$('score').textContent=score.toLocaleString();$('balls').textContent=balls;$('combo').textContent=combo.toFixed(1)+'x';$('mode').textContent=run?'live':'ready'}function add(v,t){let n=Math.round(v*combo);score+=n;combo=Math.min(9.9,combo+.15);$('msg').textContent=t+' +'+n;hud()}function dist(a,b,c,d){return Math.hypot(c-a,d-b)}function line(ax,ay,bx,by,boost){let abx=bx-ax,aby=by-ay,apx=ball.x-ax,apy=ball.y-ay,t=Math.max(0,Math.min(1,(apx*abx+apy*aby)/(abx*abx+aby*aby))),cx=ax+abx*t,cy=ay+aby*t,dx=ball.x-cx,dy=ball.y-cy,d=Math.hypot(dx,dy)||1;if(d<ball.r){let nx=dx/d,ny=dy/d;ball.x=cx+nx*ball.r;ball.y=cy+ny*ball.r;let dot=ball.vx*nx+ball.vy*ny;if(dot<0){ball.vx-=1.8*dot*nx;ball.vy-=1.8*dot*ny;ball.vx+=nx*boost;ball.vy+=ny*boost;beep(240);return 1}}}function ends(cx,cy,len,a){let dx=Math.cos(a)*len/2,dy=Math.sin(a)*len/2;return[cx-dx,cy-dy,cx+dx,cy+dy]}function step(){lf+=((keys.l?1:0)-lf)*.35;rf+=((keys.r?1:0)-rf)*.35;combo=Math.max(1,combo*.998);if(ball.hold){ball.x=640;ball.y=760+pl*45;if(keys.p)pl=Math.min(1,pl+.03);else if(pl>.05){ball.hold=0;ball.vx=-4;ball.vy=-18-pl*22;beep(160)}}else{ball.vy+=.43;ball.x+=ball.vx;ball.y+=ball.vy;ball.vx*=.997;ball.vy*=.999}[[80,110,86,700],[635,110,625,700],[86,700,250,800],[625,700,470,800],[620,130,640,805]].forEach(r=>line(...r,0));if(ball.x<45){ball.x=45;ball.vx=Math.abs(ball.vx)}if(ball.x>675){ball.x=675;ball.vx=-Math.abs(ball.vx)}if(ball.y<45){ball.y=45;ball.vy=Math.abs(ball.vy)}for(const b of bump){let d=dist(ball.x,ball.y,b.x,b.y);if(d<ball.r+b.r){let nx=(ball.x-b.x)/d,ny=(ball.y-b.y)/d,s=Math.max(11,Math.hypot(ball.vx,ball.vy));ball.x=b.x+nx*(ball.r+b.r);ball.y=b.y+ny*(ball.r+b.r);ball.vx=nx*s*1.08;ball.vy=ny*s*1.08;add(b.v,b.t);beep(b.f);b.hit=1}}let le=ends(245,800,145,-.25-lf*.75),re=ends(475,800,145,Math.PI+.25+rf*.75);line(...le,keys.l?9:0);line(...re,keys.r?9:0);if(ball.y>H+30){balls--;combo=1;if(balls<=0){run=false;$('msg').textContent='Game over '+score.toLocaleString()}else{ball={x:640,y:760,vx:0,vy:0,r:12,hold:1};$('msg').textContent='Ball drained. Launch again.'}}hud()}function glow(a,b,c,d,col,w=5){x.save();x.strokeStyle=col;x.lineWidth=w;x.shadowColor=col;x.shadowBlur=16;x.lineCap='round';x.beginPath();x.moveTo(a,b);x.lineTo(c,d);x.stroke();x.restore()}function text(t,px,py,s,col){x.save();x.font='900 '+s+'px system-ui';x.textAlign='center';x.textBaseline='middle';x.fillStyle=col;x.shadowColor=col;x.shadowBlur=12;x.fillText(t,px,py);x.restore()}function draw(){x.clearRect(0,0,W,H);x.fillStyle='#05050c';x.fillRect(0,0,W,H);[[80,110,86,700,'#22f2ff'],[635,110,625,700,'#ff38ef'],[86,700,250,800,'#22f2ff'],[625,700,470,800,'#ff38ef'],[620,130,640,805,'#ff9d28']].forEach(r=>glow(...r));bump.forEach(b=>{b.hit=(b.hit||0)*.85;x.beginPath();x.arc(b.x,b.y,b.r+b.hit*12,0,Math.PI*2);x.fillStyle='rgba(255,255,255,.08)';x.fill();x.strokeStyle=b.col;x.lineWidth=5;x.shadowColor=b.col;x.shadowBlur=20;x.stroke();text(b.t,b.x,b.y,19,b.col)});let le=ends(245,800,145,-.25-lf*.75),re=ends(475,800,145,Math.PI+.25+rf*.75);glow(...le,'#22f2ff',16);glow(...re,'#ff38ef',16);x.fillStyle='rgba(255,157,40,.2)';x.fillRect(625,760,30,pl*45);x.beginPath();x.arc(ball.x,ball.y,ball.r,0,Math.PI*2);x.fillStyle='#fff';x.shadowColor='#fff15b';x.shadowBlur=20;x.fill();text('PARTYCAT',360,88,36,'#fff15b');text('MATTBEAR',360,860,18,'#f7fbff')}function loop(){if(run)step();draw();requestAnimationFrame(loop)}function start(){au();audio&&audio.state==='suspended'&&audio.resume();score=0;balls=3;combo=1;run=true;init();$('msg').textContent='Launch the cat.';hud()}function hold(el,k){el.onpointerdown=e=>{e.preventDefault();au();keys[k]=1};el.onpointerup=el.onpointercancel=el.onpointerleave=e=>{e.preventDefault();keys[k]=0}}hold($('left'),'l');hold($('right'),'r');hold($('launch'),'p');$('start').onclick=start;$('mute').onclick=()=>{muted=!muted;$('mute').textContent=muted?'SOUND OFF':'SOUND ON'};addEventListener('keydown',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')keys.l=1;if(e.code==='ArrowRight'||e.code==='KeyD')keys.r=1;if(e.code==='Space'){keys.p=1;e.preventDefault()}if(e.code==='Enter'&&!run)start()});addEventListener('keyup',e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')keys.l=0;if(e.code==='ArrowRight'||e.code==='KeyD')keys.r=0;if(e.code==='Space'){keys.p=0;e.preventDefault()}});init();hud();loop();
</script>
</body>
</html>
