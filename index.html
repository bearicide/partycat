<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PartyCat Spiral Up</title><style>body{margin:0;overflow:hidden;background:#05050b;font-family:Bahnschrift,sans-serif;color:#fff}canvas{display:block;width:100vw;height:100vh}.ui{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:2}.box{background:#0009;border:1px solid #ffffff33;border-radius:18px;padding:10px 14px;backdrop-filter:blur(6px)}h1{margin:0;font-size:clamp(2rem,5vw,4rem);text-shadow:0 0 14px #22f2ff,0 0 28px #ff38ef}.btn{display:inline-block;margin-top:6px;padding:8px 12px;border-radius:999px;text-decoration:none;color:#fff;background:linear-gradient(135deg,#124750,#551750);border:1px solid #ffffff33}.score{font-weight:900;color:#fff25b;text-shadow:0 0 12px #fff25b}</style></head><body><div class='ui'><div class='box'><h1>PARTYCAT</h1><div>curved neon pinball prototype</div><div class='score' id='s'>0</div></div><div class='box'>A/D or touch sides<br><span id='m'>READY</span><br><a class='btn' href='https://github.com/bearicide/partycat'>repo</a></div></div><canvas id='c'></canvas><script>const c=document.getElementById('c'),x=c.getContext('2d'),S=document.getElementById('s'),M=document.getElementById('m');function rs(){c.width=innerWidth;c.height=innerHeight}addEventListener('resize',rs);rs();let l=0,r=0,score=0,party=0,flash=0;addEventListener('keydown',e=>{if(e.key==='a'||e.key==='ArrowLeft')l=1;if(e.key==='d'||e.key==='ArrowRight')r=1});addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')l=0;if(e.key==='d'||e.key==='ArrowRight')r=0});addEventListener('pointerdown',e=>{e.clientX<innerWidth/2?l=1:r=1});addEventListener('pointerup',()=>{l=r=0});let b={x:innerWidth*.78,y:innerHeight*.72,vx:-4,vy:-8,r:15},trail=[],bits=[];function add(n,t,px,py){score+=n;S.textContent=score.toLocaleString();M.textContent=t;flash=12;bits.push({x:px,y:py,t:'+'+n,life:35});if(score>0&&score%1000<n)party=240}function rail(a,b,c,d,col){x.strokeStyle=col;x.shadowColor=col;x.shadowBlur=18;x.lineWidth=6;x.beginPath();x.moveTo(a,b);x.quadraticCurveTo((a+c)/2,(b+d)/2-80,c,d);x.stroke()}function seg(ax,ay,bx,by,p=.92){let vx=bx-ax,vy=by-ay,wx=b.x-ax,wy=b.y-ay,t=Math.max(0,Math.min(1,(wx*vx+wy*vy)/(vx*vx+vy*vy))),px=ax+vx*t,py=ay+vy*t,dx=b.x-px,dy=b.y-py,d=Math.hypot(dx,dy);if(d<b.r){let nx=dx/(d||1),ny=dy/(d||1);b.x=px+nx*(b.r+1);b.y=py+ny*(b.r+1);let dot=b.vx*nx+b.vy*ny;b.vx-=(1+p)*dot*nx;b.vy-=(1+p)*dot*ny;return true}return false}function bump(cx,cy,rr,col,name,val){let d=Math.hypot(b.x-cx,b.y-cy);x.fillStyle=col;x.shadowColor=col;x.shadowBlur=24;x.beginPath();x.arc(cx,cy,rr+(d<b.r+rr?8:0),0,7);x.fill();x.fillStyle='#fff';x.font='900 16px sans-serif';x.textAlign='center';x.fillText(name,cx,cy+5);if(d<b.r+rr){let nx=(b.x-cx)/(d||1),ny=(b.y-cy)/(d||1),sp=Math.max(11,Math.hypot(b.vx,b.vy)+2);b.x=cx+nx*(b.r+rr+1);b.y=cy+ny*(b.r+rr+1);b.vx=nx*sp;b.vy=ny*sp;add(val,name,cx,cy)}}function loop(){x.clearRect(0,0,c.width,c.height);let g=x.createLinearGradient(0,0,0,c.height);g.addColorStop(0,party?'#39205a':'#151a44');g.addColorStop(1,'#04040a');x.fillStyle=g;x.fillRect(0,0,c.width,c.height);if(flash>0){x.fillStyle='rgba(255,242,91,.08)';x.fillRect(0,0,c.width,c.height);flash--}for(let y=0;y<c.height;y+=32){x.strokeStyle='rgba(255,255,255,.04)';x.beginPath();x.moveTo(0,y);x.lineTo(c.width,y+12);x.stroke()}rail(90,120,120,c.height-180,'#22f2ff');rail(120,c.height-180,c.width*.36,c.height-90,'#22f2ff');rail(c.width-120,180,c.width-120,c.height-180,'#ff9d28');rail(c.width-120,c.height-180,c.width*.64,c.height-90,'#ff38ef');rail(c.width*.82,c.height*.9,c.width*.72,80,'#fff25b');bump(c.width*.36,c.height*.32,42,'#ff38ef','KICK',100);bump(c.width*.64,c.height*.4,52,'#22f2ff','BASS',160);bump(c.width*.5,c.height*.55,36,'#83ff4f','WILD',220);trail.push({x:b.x,y:b.y});if(trail.length>12)trail.shift();trail.forEach((p,i)=>{x.globalAlpha=i/trail.length*.2;x.beginPath();x.arc(p.x,p.y,b.r,0,7);x.fillStyle=party?'#fff25b':'#22f2ff';x.fill()});x.globalAlpha=1;b.vy+=party?.16:.18;b.vx*=.999;b.x+=b.vx;b.y+=b.vy;seg(120,c.height-180,c.width*.36,c.height-90);seg(c.width-120,c.height-180,c.width*.64,c.height-90);let lf={x:c.width*.33,y:c.height-110,a:-.35-(l?.65:0)},rf={x:c.width*.67,y:c.height-110,a:3.49+(r?.65:0)};function fl(f,col,pw){let ex=f.x+Math.cos(f.a)*125,ey=f.y+Math.sin(f.a)*125;x.strokeStyle=col;x.shadowColor=col;x.shadowBlur=20;x.lineWidth=17;x.lineCap='round';x.beginPath();x.moveTo(f.x,f.y);x.lineTo(ex,ey);x.stroke();if(seg(f.x,f.y,ex,ey,.98)&&pw){b.vx+=Math.cos(f.a)*1.5;b.vy+=Math.sin(f.a)*1.2-2.2;add(25,'FLIP',f.x,f.y)}}fl(lf,'#22f2ff',l);fl(rf,'#ff38ef',r);if(b.x<b.r||b.x>c.width-b.r)b.vx*=-.94;if(b.y<b.r)b.vy=Math.abs(b.vy)*.94;if(b.y>c.height+80){b={x:innerWidth*.78,y:innerHeight*.72,vx:-4,vy:-9,r:15};trail=[];M.textContent='BALL SERVED'}let rg=x.createRadialGradient(b.x-5,b.y-5,2,b.x,b.y,22);rg.addColorStop(0,'#fff');rg.addColorStop(.4,'#dff7ff');rg.addColorStop(1,'#293048');x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fillStyle=rg;x.shadowBlur=20;x.shadowColor='#fff';x.fill();bits=bits.filter(q=>--q.life>0);bits.forEach(q=>{q.y-=1.2;x.fillStyle='#fff25b';x.font='900 22px sans-serif';x.fillText(q.t,q.x,q.y)});if(party>0){party--;x.fillStyle='#fff25b';x.font='900 38px sans-serif';x.textAlign='center';x.fillText('PARTY MODE',c.width/2,170)}requestAnimationFrame(loop)}loop()</script></body></html>
